version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  auth-service:
    build: ./auth_service
    ports:
      - "8000:8000"
    env_file:
      - ./auth_service/.env
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000

  bot-service:
    build: ./bot_service
    env_file:
      - ./bot_service/.env
    depends_on:
      - rabbitmq
      - redis
    command: uv run python -m app.bot.dispatcher

  bot-api:
    build: ./bot_service
    ports:
      - "8001:8001"
    env_file:
      - ./bot_service/.env
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8001

  celery-worker:
    build: ./bot_service
    env_file:
      - ./bot_service/.env
    depends_on:
      - rabbitmq
      - redis
    command: uv run celery -A app.infra.celery_app worker --loglevel=info
